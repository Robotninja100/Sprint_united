<!doctype html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Sprint United — Pagina doorsturen…</title>
  <!--
    SPA GitHub Pages redirect (rafgraph/spa-github-pages).
    Wanneer een gebruiker of crawler direct naar een deep URL gaat
    (bv. /foo), serveert GitHub Pages deze 404. Dit script herschrijft
    de URL naar /?/foo zodat index.html de pad-restore kan uitvoeren
    en React Router de juiste route kan tonen.
  -->
  <script>
    (function(l) {
      var pathSegmentsToKeep = 0; // custom domain — geen project-subpad
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    }(window.location));
  </script>
</head>

<body>
  <p>Een moment, je wordt doorgestuurd…</p>
</body>

</html>
